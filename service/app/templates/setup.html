{% extends "base.html" %}
{% block title %}Settings: {{ app_name }}{% endblock %}
{% block head %}
<style>
  body { margin: 0; background: #0b0f17; color: #e5e7eb; font-family: system-ui, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem; }
  h1 { font-size: 1.3rem; }
  a { color: #38bdf8; }
  fieldset { border: 1px solid #1f2937; border-radius: 0.6rem; margin: 1.2rem 0; padding: 1rem 1.2rem; }
  legend { padding: 0 0.5rem; color: #94a3b8; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; }
  label { display: block; margin: 0.7rem 0 0.2rem; }
  input, select { background: #111827; color: #fff; border: 1px solid #334155; border-radius: 0.4rem;
    padding: 0.4rem 0.6rem; min-width: 8rem; }
  button { background: #2563eb; color: #fff; border: 0; border-radius: 0.4rem; padding: 0.5rem 1.1rem;
    cursor: pointer; margin-top: 1rem; }
  .row { display: flex; align-items: center; gap: 0.6rem; }
  #status { margin-left: 1rem; color: #4ade80; }
</style>
{% endblock %}
{% block body %}
<div class="wrap">
  <h1>{{ app_name }} settings</h1>
  <p><a href="/layout-editor">Layout editor</a> &middot; <a href="/start">Start menu</a>
    &middot; v{{ app_version }}</p>

  <fieldset>
    <legend>Surfaces</legend>
    <div class="row"><input type="checkbox" id="start_page_enabled"
      {% if settings.start_page_enabled %}checked{% endif %}>
      <label for="start_page_enabled" style="margin:0">Show the start menu</label></div>
    <div class="row"><input type="checkbox" id="kiosk_enabled"
      {% if settings.kiosk_enabled %}checked{% endif %}>
      <label for="kiosk_enabled" style="margin:0">Kiosk display attached</label></div>
  </fieldset>

  <fieldset>
    <legend>Stream Deck</legend>
    <label for="deck_rotation">Rotation</label>
    <select id="deck_rotation">
      {% for r in rotations %}
      <option value="{{ r }}" {% if settings.deck_rotation == r %}selected{% endif %}>{{ r }}&deg;</option>
      {% endfor %}
    </select>
    <label for="deck_brightness">Brightness ({{ settings.deck_brightness }}%)</label>
    <input type="number" id="deck_brightness" min="5" max="100" value="{{ settings.deck_brightness }}">
  </fieldset>

  <div class="row">
    <button id="save">Save settings</button><span id="status"></span>
  </div>
</div>
<script>
  document.getElementById('save').addEventListener('click', async () => {
    const body = {
      start_page_enabled: document.getElementById('start_page_enabled').checked,
      kiosk_enabled: document.getElementById('kiosk_enabled').checked,
      deck_rotation: parseInt(document.getElementById('deck_rotation').value, 10),
      deck_brightness: parseInt(document.getElementById('deck_brightness').value, 10),
    };
    const r = await fetch('/setup/save', {method: 'POST',
      headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
    document.getElementById('status').textContent = r.ok ? 'Saved' : 'Save failed';
    setTimeout(() => document.getElementById('status').textContent = '', 2000);
  });
</script>
{% endblock %}
