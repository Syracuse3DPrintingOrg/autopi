services:
  autopi:
    build: ./service
    container_name: autopi
    environment:
      - TZ=${TZ:-America/New_York}
    # Dev workflow: mount the code and run with --reload so `git pull` applies
    # changes live. The published image's default command omits --reload.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./service/app:/app/app
      - ./service/data:/app/data
    ports:
      - "9284:8000"
    # Hardware device access (optional). Left off by default so `docker compose
    # up` works on a server that has no such devices (the app degrades
    # gracefully). Uncomment the lines you need, then `docker compose up -d`.
    #
    # GPIO is a fixed node, so pass it through directly:
    # devices:
    #   - "/dev/gpiomem:/dev/gpiomem"
    #
    # A USB camera for the vision reference is hot-pluggable, so do NOT list it
    # under devices:. Docker requires every devices: entry to exist when the
    # container starts, so unplugging the camera would stop the app from starting
    # at all. Grant the video4linux major and mount /dev instead; the container
    # then starts with or without a camera and sees one as soon as it is plugged
    # in. The image already ships fswebcam to grab frames.
    # device_cgroup_rules:
    #   - "c 81:* rmw"
    # volumes:
    #   - "/dev:/dev"
    restart: unless-stopped
