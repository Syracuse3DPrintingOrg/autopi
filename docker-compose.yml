services:
  autopi:
    build: ./service
    container_name: autopi
    environment:
      - TZ=${TZ:-America/New_York}
    # Dev workflow: mount the code and run with --reload so `git pull` applies
    # changes live. The published image's default command omits --reload.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./service/app:/app/app
      - ./service/data:/app/data
    ports:
      - "9284:8000"
    # Hardware device access (optional). Left off by default so `docker compose
    # up` works on a server that has no such devices (the app degrades
    # gracefully). Uncomment the lines you need on a Pi, then `docker compose up -d`:
    #   - GPIO: /dev/gpiomem
    #   - USB camera for the vision reference: map the video node(s) your camera
    #     creates. A Logitech C270 is usually /dev/video0 (plus /dev/video1 for
    #     metadata). The camera must be plugged in when the container starts.
    #     The image already ships fswebcam to grab frames.
    # devices:
    #   - "/dev/gpiomem:/dev/gpiomem"
    #   - "/dev/video0:/dev/video0"
    #   - "/dev/video1:/dev/video1"
    restart: unless-stopped
